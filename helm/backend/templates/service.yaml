apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  type: LoadBalancer              
  selector:
    # app: backend    
    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: backend

  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http