apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.headlessName" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  clusterIP: 10.0.37.19
  selector:
    {{- include "backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.port | default 8080 }}
      targetPort: http